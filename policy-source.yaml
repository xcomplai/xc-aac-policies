---
# Pinned rego source for the next release.
#
# The canonical source is now the IN-ORG private mirror
# xcomplai/xc-rego-policies (history-preserving mirror of the upstream
# collaborator repo ynotbhatc/rego_policy_libraries). The mirror's working
# clone keeps `upstream` wired to ynotbhatc, so we reconcile their (slow)
# changes in via `git fetch upstream && git merge` and contribute back via PRs
# to upstream — at our own pace, never blocked.
#
# Each bundle release of xc-aac-policies is built from a specific commit of the
# source repo below. To cut a new bundle release:
#
#   1. Bump `source.ref` here to the desired rego commit SHA (or tag).
#   2. Commit + push to main on this repo.
#   3. Tag a release: `git tag vX.Y.Z && git push origin vX.Y.Z`
#   4. The `release-bundle` workflow fires on the tag push, clones rego at the
#      pinned ref, runs `opa build`, and creates the GitHub Release with the
#      `xc-aac-policies-vX.Y.Z.tar.gz` asset (plus a SHA256 sidecar).
#
# NOTE: the source repo is PRIVATE, so the release-bundle workflow's checkout
# authenticates with the `POLICY_SOURCE_TOKEN` repo secret (a fine-grained PAT
# with Contents:read on xcomplai/xc-rego-policies). The secret MUST exist before
# the next tagged release builds — see .github/workflows/release-bundle.yml.
#
# The `aac-opa` Helm chart in xcomplai/xc-aac then bumps its default
# `policies.bundle.https.resource` to the new tarball name when consumers are
# ready to roll forward.

source:
  repo: xcomplai/xc-rego-policies
  # The in-org source carries the AAC fact_contract/v1 layer (aac/) natively:
