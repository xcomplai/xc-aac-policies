name: Release bundle

# Build an OPA bundle from a pinned rego_policy_libraries commit (see
# policy-source.yaml) and upload it as a GitHub Release asset. Triggered on
# EDGE tag push (v*.*.*-edge.*) or manual dispatch.
#
# ⚠ BUILD IS EDGE-ONLY ON PUSH. rc/stable are RETAG-NO-REBUILD (ADR-012): they are
# cut by promote-bundle.yml (copy the edge.N assets — no rebuild, sigs preserved),
# NOT by pushing a vX.Y.Z-rc.N / bare vX.Y.Z tag here. A non-edge push tag would
# rebuild + re-sign (new digest) and break the soak guarantee — so the push trigger
# is scoped to `*-edge.*`. (workflow_dispatch can still target any tag for a manual
# rebuild — use it deliberately, not for promotion.)
#
# Workflow:
#   1. Read source.ref from policy-source.yaml.
#   2. Clone ynotbhatc/rego_policy_libraries at that ref.
#   3. Install OPA CLI.
#   4. Run `opa build -b . -o xc-aac-policies-${TAG}.tar.gz`.
#   5. Compute SHA256.
#   6. Sign the tarball with sigstore/cosign (keyless, GitHub OIDC).
#   7. Create / update the GitHub Release for the tag and upload the tarball,
#      sha256 sidecar, .sig signature, and .crt certificate.

on:
  push:
    tags:
      - '*-edge.*'   # EDGE only — rc/stable promote via promote-bundle.yml (no rebuild)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create / overwrite (e.g. v1.1.0)'
        required: true

permissions:
  contents: write   # to create the Release + upload assets
  id-token: write   # to mint the GitHub OIDC token cosign uses for keyless signing
  packages: write   # to push the OCI mirror to ghcr.io/xcomplai/xc-aac-policies

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout this repo (for policy-source.yaml)
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read pinned rego source ref
        id: source
        run: |
          ref=$(python3 -c '
          import yaml, pathlib
          d = yaml.safe_load(pathlib.Path("policy-source.yaml").read_text())
          print(d["source"]["ref"])
          ')
          repo=$(python3 -c '
          import yaml, pathlib
          d = yaml.safe_load(pathlib.Path("policy-source.yaml").read_text())
          print(d["source"]["repo"])
          ')
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"

      # The rego source (xcomplai/xc-rego-policies, per policy-source.yaml) is a
      # PRIVATE in-org repo, so the default GITHUB_TOKEN — scoped to THIS repo —
      # cannot read it. Authenticate with POLICY_SOURCE_TOKEN: a fine-grained PAT
      # with Contents:read on the source repo, stored as a repo/org secret here.
      # Create it before the next tagged release, or this checkout 404s/403s.
      - name: Checkout rego source @ pinned ref
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.source.outputs.repo }}
          ref: ${{ steps.source.outputs.ref }}
          path: rego_src
          token: ${{ secrets.POLICY_SOURCE_TOKEN }}

      # Guard the per-domain partition BEFORE building: fail fast if any domain's
      # rego references a PACKAGE owned by another domain (e.g. a compliance/ot
      # framework importing data.aac.lib.*). Such a reference is undefined in the
      # referencing instance's bundle — the fix is to factor the shared package
      # into a `common` bundle co-loaded everywhere, not to ship a broken bundle.
      # See scripts/check-cross-domain-imports.py + opa-per-instance-scoping.
      - name: Guard cross-domain references (common-bundle trip-wire)
        run: python3 scripts/check-cross-domain-imports.py rego_src

      - name: Install OPA
        run: |
          OPA_VERSION="${OPA_VERSION:-1.12.2}"
          curl -fsSL -o /usr/local/bin/opa \
            "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x /usr/local/bin/opa
          opa version

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      # The rego source (xcomplai/xc-rego-policies) now carries the AAC
      # fact_contract/v1 layer natively under aac/ (data.aac.lib.* +
      # data.<framework>.main + data.aac.catalog) — the former in-repo overlay was
      # collapsed into the source. No injection step is needed: `opa build` picks
      # it up from the checked-out source. Source-side rego (incl. the aac/ unit
      # tests) is validated by xc-rego-policies' own opa-test CI on every PR + push.

      - name: Build OPA bundles (per-domain)
        id: build
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Per-domain bundles ONLY (security/compliance/ot) — one per OPA
          # instance. The combined "everything" bundle was dropped at v2.2.0+
          # (consumers migrated to per-domain via the aac-opa chart; v2.1.0 keeps
          # its combined bundle as the rollback anchor). Driven by
          # bundle-domains.yaml; computes explicit .manifest roots (opa build does
          # NOT auto-derive them). See scripts/build-domain-bundles.sh.
          bash scripts/build-domain-bundles.sh rego_src . "${TAG}"
          # sha256 sidecar for every bundle (re-stamps the per-domain ones identically)
          for B in xc-aac-policies-*.tar.gz; do
            sha256sum "$B" | awk '{print $1}' > "$B.sha256"
          done
          ls -la xc-aac-policies-*.tar.gz

      - name: Inspect bundles (sanity — file count + manifest roots)
        run: |
          for B in xc-aac-policies-*.tar.gz; do
            roots=$(tar xzOf "$B" /.manifest 2>/dev/null | python3 -c "import sys,json;print(len(json.load(sys.stdin).get('roots',[])))" 2>/dev/null || echo '?')
            echo "  $B — $(tar tzf "$B" | wc -l) files, ${roots} roots"
          done

      # Keyless signing with the workflow's GitHub OIDC identity (no PGP/cosign
      # keys to manage). Produces an inline .sig + the leaf cert (.crt) used to
      # mint the signing key. Consumers verify with `cosign verify-blob`
      # gating on the workflow's OIDC identity (see README + chart's
      # policies.bundle.verification placeholder).
      - name: Sign bundles with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          COSIGN_YES: "true"
        run: |
          for B in xc-aac-policies-*.tar.gz; do
            cosign sign-blob \
              --bundle "${B}.cosign.bundle" \
              --output-signature "${B}.sig" \
              --output-certificate "${B}.crt" \
              "${B}"
          done
          ls -la xc-aac-policies-*.tar.gz.* | sed 's/  */ /g'

      - name: Verify signatures (self-check before publish)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for B in xc-aac-policies-*.tar.gz; do
            cosign verify-blob \
              --signature "${B}.sig" \
              --certificate "${B}.crt" \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release-bundle.yml@refs/(tags|heads)/.*" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "${B}"
          done

      # Mirror the bundle to ghcr.io as an OCI artifact so customers running
      # Harbor/Artifactory/Nexus/internal-quay can `oras copy` it into their
      # registry. The HTTPS GitHub Release remains the primary distribution
      # path (OPA's HTTPS bundle plugin is mature; the OCI plugin is still
      # quirky across registries — see policies/distribution memory note).
      # Stays private by default per the xcomplai org's package-visibility
      # policy; customers with read access to the org's packages can pull
      # directly, or mirror into their own registry.
      - name: Install oras
        uses: oras-project/setup-oras@v2
        with:
          version: 1.2.0

      - name: Push bundles as OCI artifacts to ghcr.io
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          OCI_REPO="ghcr.io/${{ github.repository_owner }}/xc-aac-policies"
          echo "${GH_TOKEN}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

          # image-spec v1.0 for the broadest registry / OPA-OCI-client compat.
          # Combined bundle → :TAG + :latest. Per-domain bundle → :TAG-<domain>
          # + :<domain>-latest (each OPA instance pulls its own domain tag).
          push_one() {  # $1=bundle file  $2=comma-separated tags  $3=version label
            oras push --image-spec v1.0 "${OCI_REPO}:$2" \
              "$1:application/vnd.oci.image.layer.v1.tar+gzip" \
              --annotation "org.opencontainers.image.title=xc-aac-policies" \
              --annotation "org.opencontainers.image.version=$3" \
              --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              --annotation "org.opencontainers.image.revision=${GITHUB_SHA}" \
              --annotation "org.opencontainers.image.description=AAC OPA policy bundle — mirror of the GitHub Release tarball"
          }

          # Per-domain only (combined bundle dropped at v2.2.0+).
          for D in security compliance ot; do
            B="xc-aac-policies-${D}-${TAG}.tar.gz"
            [ -f "$B" ] || continue
            push_one "$B" "${TAG}-${D},${D}-latest" "${TAG}-${D}"
            echo "Pushed OCI: ${OCI_REPO}:${TAG}-${D} (+ :${D}-latest)"
          done

      - name: Create / update Release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REGO_REPO="${{ steps.source.outputs.repo }}"
          REGO_REF="${{ steps.source.outputs.ref }}"

          # Every bundle + its sidecars (.sha256/.sig/.crt/.cosign.bundle).
          shopt -s nullglob
          ASSETS=( xc-aac-policies-*.tar.gz xc-aac-policies-*.tar.gz.sha256 \
                   xc-aac-policies-*.tar.gz.sig xc-aac-policies-*.tar.gz.crt \
                   xc-aac-policies-*.tar.gz.cosign.bundle )

          NOTES=$(cat <<EOF
          OPA policy bundles built from ${REGO_REPO} @ ${REGO_REF}, sigstore-signed (keyless, GitHub OIDC).

          ## Bundles (per-domain — the combined "everything" bundle was dropped at v2.2.0+)
          | Asset | For |
          |---|---|
          | \`xc-aac-policies-security-${TAG}.tar.gz\` | **opa-security** (:8181) — CIS/STIG/NIST + fact_contract \`aac/\` + threat detection |
          | \`xc-aac-policies-compliance-${TAG}.tar.gz\` | **opa-compliance** (:8182) — ISO/SOC2/PCI/SOX/GDPR/… + enforcement |
          | \`xc-aac-policies-ot-${TAG}.tar.gz\` | **opa-ot** (:8183) — NERC-CIP/AMI/IEC 62443 + governance |

          Each per-domain bundle carries explicit \`.manifest\` roots scoped to its domain (true per-instance scoping — chart-level \`policies.bundle.roots\` does NOT filter). Every \`.tar.gz\` has \`.sha256/.sig/.crt/.cosign.bundle\` sidecars.

          ## Verify (any bundle B)
          \`\`\`bash
          cosign verify-blob --signature B.sig --certificate B.crt \\\\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/\\.github/workflows/release-bundle\\.yml@refs/tags/v.*' \\\\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com  B
          \`\`\`

          ## OCI mirror (ghcr.io/${{ github.repository_owner }}/xc-aac-policies)
          \`:${TAG}-security\` / \`-compliance\` / \`-ot\` (+ \`:<domain>-latest\`) — one per domain. \`oras copy\` into Harbor/Artifactory/Nexus as needed; HTTPS remains primary.

          ## Chart consumption (per-domain — each OPA instance pulls its bundle)
          \`\`\`yaml
          # opa-security (:8181)
          services: { aac-bundle-server: { url: https://github.com/${{ github.repository }}/releases/download/${TAG} } }
          bundles:  { aac: { service: aac-bundle-server, resource: xc-aac-policies-security-${TAG}.tar.gz, persist: true } }
          \`\`\`
          EOF
          )

          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} exists — uploading ${#ASSETS[@]} assets with --clobber"
            gh release upload "${TAG}" "${ASSETS[@]}" --repo "${{ github.repository }}" --clobber
            gh release edit "${TAG}" --repo "${{ github.repository }}" --notes "${NOTES}"
          else
            gh release create "${TAG}" --repo "${{ github.repository }}" \
              --title "Policy bundles ${TAG}" --notes "${NOTES}" "${ASSETS[@]}"
          fi

      # Fire the xc-platform edge OOTB smoke (#28) for this edge bundle. OPT-IN:
      # cross-repo dispatch needs a token with Contents:write on xc-platform —
      # set the CI_DISPATCH_TOKEN secret here. Without it this step no-ops (the
      # smoke can always be run manually via workflow_dispatch on xc-platform).
      - name: Trigger edge OOTB smoke (xc-platform #28)
        if: ${{ startsWith(steps.tag.outputs.tag, 'v') && contains(steps.tag.outputs.tag, '-edge.') }}
        env:
          GH_TOKEN: ${{ secrets.CI_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::notice::CI_DISPATCH_TOKEN not set — skipping auto-trigger. Run the smoke manually: gh workflow run edge-ootb-smoke.yml -R ${{ github.repository_owner }}/xc-platform -f tag=${{ steps.tag.outputs.tag }}"
            exit 0
          fi
          gh api -X POST "/repos/${{ github.repository_owner }}/xc-platform/dispatches" \
            -f event_type=edge-bundle-published \
            -F "client_payload[tag]=${{ steps.tag.outputs.tag }}" \
          && echo "Dispatched edge-bundle-published(tag=${{ steps.tag.outputs.tag }}) to xc-platform." \
          || echo "::warning::dispatch failed (token scope?) — run the smoke manually."
