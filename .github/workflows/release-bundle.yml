name: Release bundle

# Build an OPA bundle from a pinned rego_policy_libraries commit (see
# policy-source.yaml) and upload it as a GitHub Release asset. Triggered on
# tag push (vX.Y.Z) or manual dispatch.
#
# Workflow:
#   1. Read source.ref from policy-source.yaml.
#   2. Clone ynotbhatc/rego_policy_libraries at that ref.
#   3. Install OPA CLI.
#   4. Run `opa build -b . -o xc-aac-policies-${TAG}.tar.gz`.
#   5. Compute SHA256.
#   6. Sign the tarball with sigstore/cosign (keyless, GitHub OIDC).
#   7. Create / update the GitHub Release for the tag and upload the tarball,
#      sha256 sidecar, .sig signature, and .crt certificate.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create / overwrite (e.g. v1.1.0)'
        required: true

permissions:
  contents: write   # to create the Release + upload assets
  id-token: write   # to mint the GitHub OIDC token cosign uses for keyless signing

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (for policy-source.yaml)
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read pinned rego source ref
        id: source
        run: |
          ref=$(python3 -c '
          import yaml, pathlib
          d = yaml.safe_load(pathlib.Path("policy-source.yaml").read_text())
          print(d["source"]["ref"])
          ')
          repo=$(python3 -c '
          import yaml, pathlib
          d = yaml.safe_load(pathlib.Path("policy-source.yaml").read_text())
          print(d["source"]["repo"])
          ')
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"

      - name: Checkout rego source @ pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.source.outputs.repo }}
          ref: ${{ steps.source.outputs.ref }}
          path: rego_src

      - name: Install OPA
        run: |
          OPA_VERSION="${OPA_VERSION:-1.12.2}"
          curl -fsSL -o /usr/local/bin/opa \
            "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x /usr/local/bin/opa
          opa version

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Build OPA bundle
        id: build
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          BUNDLE="xc-aac-policies-${TAG}.tar.gz"
          opa build -b rego_src -o "${BUNDLE}"
          sha256sum "${BUNDLE}" | awk '{print $1}' > "${BUNDLE}.sha256"
          ls -la "${BUNDLE}" "${BUNDLE}.sha256"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cat ${BUNDLE}.sha256)" >> "$GITHUB_OUTPUT"

      - name: Inspect bundle (sanity)
        run: |
          tar tzf "${{ steps.build.outputs.bundle }}" | wc -l
          tar tzf "${{ steps.build.outputs.bundle }}" | head -5

      # Keyless signing with the workflow's GitHub OIDC identity (no PGP/cosign
      # keys to manage). Produces an inline .sig + the leaf cert (.crt) used to
      # mint the signing key. Consumers verify with `cosign verify-blob`
      # gating on the workflow's OIDC identity (see README + chart's
      # policies.bundle.verification placeholder).
      - name: Sign bundle with cosign (keyless)
        id: sign
        env:
          COSIGN_EXPERIMENTAL: "1"
          COSIGN_YES: "true"
        run: |
          BUNDLE="${{ steps.build.outputs.bundle }}"
          cosign sign-blob \
            --bundle "${BUNDLE}.cosign.bundle" \
            --output-signature "${BUNDLE}.sig" \
            --output-certificate "${BUNDLE}.crt" \
            "${BUNDLE}"
          echo "signature=${BUNDLE}.sig" >> "$GITHUB_OUTPUT"
          echo "certificate=${BUNDLE}.crt" >> "$GITHUB_OUTPUT"
          echo "cosign_bundle=${BUNDLE}.cosign.bundle" >> "$GITHUB_OUTPUT"
          ls -la "${BUNDLE}".* | sed 's/  */ /g'

      - name: Verify signature (self-check before publish)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          BUNDLE="${{ steps.build.outputs.bundle }}"
          cosign verify-blob \
            --signature "${BUNDLE}.sig" \
            --certificate "${BUNDLE}.crt" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release-bundle.yml@refs/(tags|heads)/.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${BUNDLE}"

      - name: Create / update Release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          BUNDLE="${{ steps.build.outputs.bundle }}"
          SHA="${{ steps.build.outputs.sha256 }}"
          REGO_REPO="${{ steps.source.outputs.repo }}"
          REGO_REF="${{ steps.source.outputs.ref }}"

          NOTES=$(cat <<EOF
          OPA bundle built from ${REGO_REPO} @ ${REGO_REF}.

          SHA256: \`${SHA}\`

          Sigstore-signed (keyless, GitHub OIDC). Verify with:

          \`\`\`bash
          cosign verify-blob \\\\
            --signature ${BUNDLE}.sig \\\\
            --certificate ${BUNDLE}.crt \\\\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/\\.github/workflows/release-bundle\\.yml@refs/tags/v.*' \\\\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\\\
            ${BUNDLE}
          \`\`\`

          Consumed by the [\`aac-opa\` Helm chart](https://github.com/xcomplai/xc-aac/blob/main/deploy/helm/aac-opa/values.yaml) via OPA's HTTPS bundle service:

          \`\`\`yaml
          services:
            aac-bundle-server:
              url: https://github.com/xcomplai/xc-aac-policies/releases/download/${TAG}
          bundles:
            aac:
              service: aac-bundle-server
              resource: ${BUNDLE}
              polling: { min_delay_seconds: 60, max_delay_seconds: 120 }
              persist: true
          persistence_directory: /tmp/opa-persist
          \`\`\`
          EOF
          )

          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} exists — uploading assets with --clobber"
            gh release upload "${TAG}" \
              "${BUNDLE}" "${BUNDLE}.sha256" \
              "${BUNDLE}.sig" "${BUNDLE}.crt" "${BUNDLE}.cosign.bundle" \
              --repo "${{ github.repository }}" --clobber
            gh release edit "${TAG}" \
              --repo "${{ github.repository }}" \
              --notes "${NOTES}"
          else
            gh release create "${TAG}" \
              --repo "${{ github.repository }}" \
              --title "Policy bundle ${TAG}" \
              --notes "${NOTES}" \
              "${BUNDLE}#${BUNDLE}" \
              "${BUNDLE}.sha256#${BUNDLE}.sha256" \
              "${BUNDLE}.sig#${BUNDLE}.sig" \
              "${BUNDLE}.crt#${BUNDLE}.crt" \
              "${BUNDLE}.cosign.bundle#${BUNDLE}.cosign.bundle"
          fi
